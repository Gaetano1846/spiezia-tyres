# /etc/nginx/sites-available/public-spiezia-b2b2
# Symlink: ln -s /etc/nginx/sites-available/public-spiezia-b2b2 /etc/nginx/sites-enabled/

server {
    listen 80;
    server_name b2b2.spieziatyres.it;

    location /.well-known/ {
        root /var/www/html;
        allow all;
    }

    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name b2b2.spieziatyres.it;

    # TLS — emesso da certbot
    ssl_certificate     /etc/letsencrypt/live/b2b2.spieziatyres.it/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/b2b2.spieziatyres.it/privkey.pem;
    include             /etc/nginx/snippets/ssl-params.conf;

    # Header di sicurezza condivisi (HSTS, X-Frame-Options, etc.)
    include snippets/security-headers.conf;

    server_tokens off;

    access_log  /var/log/nginx/spiezia-b2b2-access.log combined;
    error_log   /var/log/nginx/spiezia-b2b2-error.log warn;

    client_max_body_size 10m;

    # Cloudflare real IP passthrough
    set_real_ip_from 103.21.244.0/22;
    set_real_ip_from 103.22.200.0/22;
    set_real_ip_from 103.31.4.0/22;
    set_real_ip_from 104.16.0.0/13;
    set_real_ip_from 104.24.0.0/14;
    set_real_ip_from 108.162.192.0/18;
    set_real_ip_from 131.0.72.0/22;
    set_real_ip_from 141.101.64.0/18;
    set_real_ip_from 162.158.0.0/15;
    set_real_ip_from 172.64.0.0/13;
    set_real_ip_from 173.245.48.0/20;
    set_real_ip_from 188.114.96.0/20;
    set_real_ip_from 190.93.240.0/20;
    set_real_ip_from 197.234.240.0/22;
    set_real_ip_from 198.41.128.0/17;
    set_real_ip_from 2400:cb00::/32;
    set_real_ip_from 2606:4700::/32;
    set_real_ip_from 2803:f800::/32;
    set_real_ip_from 2405:b500::/32;
    set_real_ip_from 2405:8100::/32;
    set_real_ip_from 2a06:98c0::/29;
    set_real_ip_from 2c0f:f248::/32;
    real_ip_header CF-Connecting-IP;

    # Report admin: aggregazione paginata su tutto Ordini per periodi ampi
    # ("tutto lo storico") può richiedere più dei 60s di default.
    location /api/admin/report {
        proxy_pass http://127.0.0.1:3301;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 120s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
        proxy_hide_header X-Powered-By;
        proxy_hide_header Server;
    }

    # App principale
    location / {
        proxy_pass http://127.0.0.1:3301;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        proxy_hide_header X-Powered-By;
        proxy_hide_header Server;
    }

    # Asset statici — cache aggressiva (Next.js usa hash nel filename)
    location ~* /_next/static/ {
        proxy_pass http://127.0.0.1:3301;
        proxy_set_header Host $host;
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header X-Content-Type-Options "nosniff" always;
    }

    # Blocca scanner comuni
    location ~ /\. {
        deny all;
        return 404;
    }

    location ~* \.(env|git|gitignore|dockerignore|sh|sql|bak|backup)$ {
        deny all;
        return 404;
    }
}
